name: Quality Check

on:
  pull_request:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint:ci

      - name: Format Check
        run: npx prettier --check "**/*.{ts,tsx,js,jsx,css,md}" --log-level warn
